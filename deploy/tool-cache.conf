HOME=/home/mnemo
PATH=/opt/mnemo/venv/bin:/usr/local/bin:/usr/bin:/bin
MCP_MANAGE_PROXY=1
MCP_PROXY_CMD="python3 -m tool_cache.mcp"
MCP_PROXY_TRANSPORT=streamablehttp
MCP_SERVER_LABEL=tool-cache
MCP_CONFIG_PATH=/nonexistent
MCP_TUNNEL_BACKEND=named
TUNNEL_NAME=mnemo-tool-cache
TUNNEL_CRED_FILE=/etc/mnemo/cloudflared/tool-cache.json
TUNNEL_PUBLIC_URL=https://your-tunnel-uuid.your-domain.example
TOOL_CACHE_EMBED_URL=http://embed.local:30801
TOOL_CACHE_QDRANT_URL=http://qdrant.local:6333
