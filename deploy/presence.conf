HOME=/home/mnemo
PATH=/opt/mnemo/venv-presence/bin:/opt/mnemo/venv/bin:/usr/local/bin:/usr/bin:/bin
PYTHONPATH=/opt/mnemo/cozy-presence/src
MCP_MANAGE_PROXY=1
MCP_PROXY_CMD="python3 -m cozy_presence.mcp_server"
MCP_PROXY_TRANSPORT=streamablehttp
MCP_SERVER_LABEL=presence
MCP_CONFIG_PATH=/nonexistent
MCP_TUNNEL_BACKEND=named
TUNNEL_NAME=mnemo-presence
TUNNEL_CRED_FILE=/etc/mnemo/cloudflared/presence.json
TUNNEL_PUBLIC_URL=https://your-tunnel-uuid.your-domain.example
QDRANT_REMOTE_URL=http://qdrant.local:6333
QDRANT_COLLECTION=mnemo-presence
PRESENCE_STORE_PATH=/etc/mnemo/presence.jsonl
PRESENCE_INDEX_PATH=/etc/mnemo/presence_qdrant
