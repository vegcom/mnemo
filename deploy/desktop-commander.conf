HOME=/home/mnemo
PATH=/opt/mnemo/venv/bin:/usr/local/bin:/usr/bin:/bin
MCP_MANAGE_PROXY=1
MCP_PROXY_CMD="npx --yes @wonderwhy-er/desktop-commander"
MCP_PROXY_TRANSPORT=sse
MCP_SERVER_LABEL=desktop-commander
MCP_CONFIG_PATH=/nonexistent
MCP_TUNNEL_BACKEND=named
TUNNEL_NAME=mnemo-desktop-commander
TUNNEL_CRED_FILE=/etc/mnemo/cloudflared/desktop-commander.json
TUNNEL_PUBLIC_URL=https://your-tunnel-uuid.your-domain.example
DC_SKIP_ONBOARDING=true
CONFIG_FILE=/etc/mnemo/desktop_commander_config.json
