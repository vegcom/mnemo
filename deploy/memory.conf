HOME=/home/mnemo
PATH=/opt/mnemo/venv/bin:/usr/local/bin:/usr/bin:/bin
MCP_MANAGE_PROXY=1
MCP_PROXY_CMD="python3 -m mnemo.memory_mcp"
MCP_PROXY_TRANSPORT=streamablehttp
MCP_SERVER_LABEL=memory
MCP_CONFIG_PATH=/nonexistent
MCP_TUNNEL_BACKEND=named
TUNNEL_NAME=mnemo-memory
TUNNEL_CRED_FILE=/etc/mnemo/cloudflared/memory.json
TUNNEL_PUBLIC_URL=https://your-tunnel-uuid.your-domain.example
QDRANT_REMOTE_URL=http://qdrant.local:6333
PRESENCE_EMBED_URL=http://embed.local:30800
PRESENCE_EMBED_MODEL=sentence-transformers/all-MiniLM-L6-v2
