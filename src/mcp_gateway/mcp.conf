# mnemo MCP Server Configuration — multi-service aggregation template
# Single-service gateways use MCP_SERVER_LABEL + fallback; no mcp.conf needed.
# Point MCP_CONFIG_PATH here to use: MCP_CONFIG_PATH=/path/to/mcp.conf
# Environment variables are expanded: ${VAR} or ${VAR:-default}

[desktop-commander]
url = http://localhost:${MCP_LOCAL_PORT:-8080}/mcp
# authorization is injected automatically from MCP_AUTH_TOKEN — no extra_headers needed
enabled = true
